<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Appwise</title>
</head>
<body>
    <h1>Únete a la Comunidad Appwise</h1>

    <form action="#">
        <div>
            <label for="nombreUsuario">Nombre Completo</label>
            <input type="text" id="nombreUsuario" placeholder="ej: Juan Perez" required>
        </div>
        <div>
            <label for="emailUsuario">Correo Electrónico</label>
            <input type="email" id="emailUsuario" placeholder="tu@email.com" required>
        </div>
        <div>
            <label for="passwordUsuario">Contraseña</label>
            <input type="password" id="passwordUsuario">
        </div>
        <div>
            <label for="fechaNacimientoUsuario">Fecha de Nacimiento</label>
            <input type="date" id="fechaNacimientoUsuario" required>
        </div>
        <div>
            <label for="opcionNivelProgramacion">Nivel en Programación</label>
            <select id="opcionNivelProgramacion" required>
                <option value="trainee">Trainee</option>
                <option value="junior">Junior</option>
                <option value="semi-Senior">Semi-Senior</option>
            </select>
        </div>
        <div>
            <h3>¿Cuál es tu especialidad favorita?</h3>
            <div>
                <input type="radio" name="especialidad">
                <label for="especialidadUsuario">FrontEnd (diseño e interfaz)</label>
            </div>
             <div>
                <input type="radio" name="especialidad">
                <label for="especialidadUsuario">Backend (lógica y base de datos)</label>
            </div>
        </div>
        <div>
            <input type="checkbox" id="aceptarTerminos" value="yes" required>
            <label for="aceptarTerminos">Acepto los términos y condiciones.</label>
        </div>
        <button type="submit">Crear Cuenta</button>
    </form>
    
</body>
</html>
