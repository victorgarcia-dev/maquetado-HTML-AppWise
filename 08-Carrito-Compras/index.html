<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Appwise</title>
</head>
<body>

    <!--cabecera de pagina-->
    <header>
        <!--titulo principal de la pagina-->
        <h1>Appwise Store</h1>
        <button>🛒 Ver Carrito (2)</button>
    </header>

    <!--contenido principal-->
    <main>
        <h2>Nuestros Productos</h2>
        <!--sección lista de productos-->
        <section>
            <article>
                <img src="./assets/auricular_gamer.webp" alt="img-auriculares" width="20%">
                <h3>Auriculares Inalambricos</h3>
                <p>$49.99</p>
                <button>Añadir al carrito</button>
            </article>
             <article>
                <img src="./assets/teclado_mecanico.webp" alt="img-teclado" width="20%">
                <h3>Tecado Mecánico</h3>
                <p>$99.99</p>
                <button>Añadir al carrito</button>
            </article>
             <article>
                <img src="./assets/mouse_gamer.webp" alt="img-mouse" width="20%">
                <h3>Mouse Gamer RGB</h3>
                <p>$29.99</p>
                <button>Añadir al carrito</button>
            </article>
        </section>
        
        <!--información lateral sobre el resumen de la compra-->
        <aside>
            <h2>Resumen de Compra</h2>
            <ul>
                <li>
                    <h3>Teclado Mecánico</h3>
                    <p>
                        <strong>$99.00</strong>
                    </p>
                    <button>❌</button>
                </li>
                <li>
                    <h3>Auriculares Inalambricos</h3>
                    <p>
                        <strong>$49.00</strong>
                    </p>
                    <button>❌</button>
                </li>  
            </ul>
            <hr>
            <div>
                <h3> 
                    <strong>Total: $149.99</strong>
                </h3>
                <button>Finalizar Compra</button>
            </div>
        </aside>
    </main> 
</body>
</html>
